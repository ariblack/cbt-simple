<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login CBT Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ===== CSS VARIABLES & THEMES ===== */
        :root {
            --g50: #e8f5e9; --g100: #c8e6c9; --g200: #a5d6a7; --g300: #81c784;
            --g400: #66bb6a; --g500: #4caf50; --g600: #43a047; --g700: #388e3c;
            --g800: #2e7d32; --g900: #1b5e20; --g950: #0d3b12;
            --bg: #f2f8f2; --card: #ffffff; --text: #1a2e1a; --muted: #5a7a5a;
            --sh: 0 8px 32px rgba(30,90,30,0.12);
            --danger: #dc2626;
            --success: #16a34a;
        }

        body.theme-blue {
            --g50: #e3f2fd; --g100: #bbdefb; --g200: #90caf9; --g300: #64b5f6;
            --g400: #42a5f5; --g500: #2196f3; --g600: #1e88e5; --g700: #1976d2;
            --g800: #1565c0; --g900: #0d47a1; --g950: #0a2e6e;
            --bg: #eef5ff; --text: #0a2e6e; --muted: #3a5a8a;
        }
        body.theme-purple {
            --g50: #f3e8ff; --g100: #e9d5ff; --g200: #d8b4fe; --g300: #c084fc;
            --g400: #a855f7; --g500: #9333ea; --g600: #7e22ce; --g700: #6b21a8;
            --g800: #581c87; --g900: #3b0764; --g950: #1e0a3a;
            --bg: #faf5ff; --text: #2e1065; --muted: #6b21a8;
        }
        body.theme-orange {
            --g50: #fff7ed; --g100: #ffedd5; --g200: #fed7aa; --g300: #fdba74;
            --g400: #fb923c; --g500: #f97316; --g600: #ea580c; --g700: #c2410c;
            --g800: #9a3412; --g900: #7c2d12; --g950: #431407;
            --bg: #fffaf0; --text: #7c2d12; --muted: #9a3412;
        }
        body.theme-pink {
            --g50: #fdf2f8; --g100: #fce7f3; --g200: #fbcfe8; --g300: #f9a8d4;
            --g400: #f472b6; --g500: #ec4899; --g600: #db2777; --g700: #be185d;
            --g800: #9d174d; --g900: #831843; --g950: #500724;
            --bg: #fff5f8; --text: #831843; --muted: #be185d;
        }
        body.theme-teal {
            --g50: #f0fdfa; --g100: #ccfbf1; --g200: #99f6e4; --g300: #5eead4;
            --g400: #2dd4bf; --g500: #14b8a6; --g600: #0d9488; --g700: #0f766e;
            --g800: #115e59; --g900: #134e4a; --g950: #042f2e;
            --bg: #f0fdfa; --text: #134e4a; --muted: #0f766e;
        }
        body.theme-brown {
            --g50: #faf7f0; --g100: #f2e8d5; --g200: #e5d0b0; --g300: #d4b88a;
            --g400: #c2a065; --g500: #a8843c; --g600: #8b652e; --g700: #6e4e24;
            --g800: #543c1c; --g900: #3b2a14; --g950: #241a0c;
            --bg: #fefaf5; --text: #3b2a14; --muted: #6e4e24;
        }
        body.theme-dark {
            --g50: #2d2d2d; --g100: #3d3d3d; --g200: #4d4d4d; --g300: #5d5d5d;
            --g400: #6d6d6d; --g500: #7d7d7d; --g600: #8d8d8d; --g700: #9d9d9d;
            --g800: #adadad; --g900: #bdbdbd; --g950: #cccccc;
            --bg: #1a1a1a; --card: #2d2d2d; --text: #e0e0e0; --muted: #aaaaaa;
        }

        /* ===== LAYOUT VARIATIONS ===== */
        .layout-modern .login-card {
            border-radius: 28px;
            box-shadow: var(--sh), 0 0 0 1px rgba(76,175,80,0.08);
            border: none;
        }
        .layout-classic .login-card {
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid #ddd;
        }
        .layout-minimal .login-card {
            background: white;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.06);
            border-radius: 16px;
        }
        .layout-gradient .login-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        /* ===== BASE STYLES ===== */
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; min-height: 100vh; }
        body {
            background: linear-gradient(135deg, var(--g50) 0%, var(--bg) 50%, var(--g100) 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            padding: 20px; position: relative; overflow-x: hidden;
            transition: background 0.4s ease, color 0.3s ease;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(76,175,80,0.08) 0%, transparent 25%),
                radial-gradient(circle at 85% 80%, rgba(46,125,50,0.08) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(129,199,132,0.05) 0%, transparent 35%);
            pointer-events: none; z-index: 0;
        }

        .float-decoration {
            position: fixed; pointer-events: none; z-index: 0; opacity: 0.35;
            font-size: 2.5rem; animation: floatAnim 7s ease-in-out infinite;
        }
        .float-decoration:nth-child(1) { top: 12%; left: 6%; animation-delay: 0s; }
        .float-decoration:nth-child(2) { bottom: 18%; right: 8%; animation-delay: 2s; }
        .float-decoration:nth-child(3) { top: 60%; left: 8%; animation-delay: 4s; }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .login-card {
            background: var(--card); padding: 44px 36px; width: 100%; max-width: 440px;
            position: relative; z-index: 1;
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.3s ease;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--g700), var(--g400), var(--g600), var(--g700));
            background-size: 200% 100%; animation: shimmer 4s ease-in-out infinite;
            border-radius: 28px 28px 0 0;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ===== LOGO SEKOLAH GAYA BARU ===== */
        .school-icon {
            width: 76px; height: 76px;
            background: #ffffff; /* latar putih bersih */
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
            box-shadow: 0 10px 30px rgba(46,125,50,0.25);
            animation: iconPulse 3s ease-in-out infinite;
            overflow: hidden;
            padding: 8px;
            transition: all 0.3s ease;
        }
        .school-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(46,125,50,0.25); }
            50% { transform: scale(1.05); box-shadow: 0 14px 40px rgba(46,125,50,0.35); }
        }

        .school-name {
            font-weight: 800; color: var(--g950); text-align: center;
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px;
            line-height: 1.3; transition: font-size 0.3s ease;
        }
        .app-name {
            color: var(--g700); font-weight: 600; text-align: center;
            letter-spacing: 4px; text-transform: uppercase; font-size: 0.82em;
            margin-bottom: 28px; transition: font-size 0.3s ease;
        }
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--g200), transparent);
            margin: 24px 0; border-radius: 2px;
        }

        .form-label {
            font-weight: 700; color: var(--g800); font-size: 0.88rem;
            margin-bottom: 8px; display: block;
        }
        .form-control {
            border-radius: 14px; padding: 15px 20px; border: 2px solid var(--g100);
            background: var(--g50); color: var(--g900); font-weight: 600;
            font-size: 1.1rem; letter-spacing: 2px; transition: all 0.25s ease;
            text-align: center; width: 100%;
        }
        .form-control:focus {
            background: #fff; border-color: var(--g500);
            box-shadow: 0 0 0 5px rgba(76,175,80,0.12);
            transform: scale(1.01); outline: none;
        }
        .form-control::placeholder { color: var(--muted); font-weight: 400; letter-spacing: 0; }

        .btn-login {
            background: linear-gradient(135deg, var(--g800) 0%, var(--g600) 100%);
            color: #fff; border: none; border-radius: 14px; padding: 17px;
            font-weight: 700; font-size: 1rem; letter-spacing: 2.5px; width: 100%;
            margin-top: 14px; box-shadow: 0 6px 24px rgba(46,125,50,0.35);
            transition: all 0.25s ease; cursor: pointer; text-transform: uppercase;
        }
        .btn-login:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--g900) 0%, var(--g700) 100%);
            box-shadow: 0 8px 32px rgba(46,125,50,0.45); transform: translateY(-3px);
        }
        .btn-login:active:not(:disabled) { transform: scale(0.98) translateY(0); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.96);
            z-index: 2000; display: none; align-items: center; justify-content: center;
            flex-direction: column; backdrop-filter: blur(8px);
        }
        .loading-overlay.show { display: flex !important; }
        .spinner {
            width: 56px; height: 56px; border: 5px solid var(--g100);
            border-top-color: var(--g700); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: var(--g700); font-weight: 600; font-size: 1.05rem;
            animation: pulseText 1.5s ease-in-out infinite;
        }
        @keyframes pulseText { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .toast-container {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            z-index: 3000; width: 92%; max-width: 420px; pointer-events: none;
        }
        .toast-alert {
            pointer-events: auto; background: #fff; border-left: 5px solid var(--g800);
            padding: 18px 22px; border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            display: flex; align-items: center; gap: 14px;
            animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            font-size: 0.95rem; color: var(--text); margin-bottom: 10px;
        }
        .toast-alert .icon { font-size: 1.5rem; flex-shrink: 0; }
        .toast-error { border-left-color: #dc2626; }
        .toast-error .icon { color: #dc2626; }
        .toast-warning { border-left-color: #d97706; }
        .toast-warning .icon { color: #d97706; }
        .toast-success { border-left-color: var(--success); }
        .toast-success .icon { color: var(--success); }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .helper-text {
            font-size: 0.82rem; color: var(--muted); text-align: center;
            margin-top: 28px; line-height: 1.7;
        }
        .helper-text a { color: var(--g700); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .helper-text a:hover { color: var(--g900); text-decoration: underline; }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; border-radius: 24px; }
            .school-icon { width: 64px; height: 64px; border-radius: 18px; padding: 6px; }
            .form-control { padding: 13px 16px; font-size: 1rem; }
            .btn-login { padding: 15px; font-size: 0.92rem; }
            .float-decoration { display: none; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--g300); border-radius: 3px; }
    </style>
</head>
<body>

<div class="float-decoration">📚</div>
<div class="float-decoration">✏️</div>
<div class="float-decoration">🎓</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Memproses...</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="login-card" id="loginCard">
    <!-- Logo sekolah menggunakan gambar dari URL -->
    <div class="school-icon">
    </div>
    <h1 id="displaySekolah" class="school-name">MEMUAT...</h1>
    <div id="displayAplikasi" class="app-name">MEMUAT...</div>
    <div class="divider"></div>
    <form id="loginForm" onsubmit="return false;">
        <div class="mb-3">
            <label for="UsernameInput" class="form-label">Username</label>
            <input type="text" id="UsernameInput" class="form-control" placeholder="Masukkan Username Anda"
                   required autocomplete="off" inputmode="numeric" autofocus>
        </div>
        <button type="submit" class="btn-login" id="btnLogin" onclick="handleLogin(event)">
            🚀 MULAI UJIAN
        </button>
    </form>
    <div class="helper-text">
        Pastikan Menjawab Dengan JUJUR.<br>
        &copy; 2026 CBT offline — <a href="/admin">mujisensei</a>
    </div>
</div>

<script>
var CONFIG = { API_BASE: '', TIMEOUT: 15000 };

function showLoading(show) {
    var el = document.getElementById('loadingOverlay');
    el.style.display = show ? 'flex' : 'none';
}

function showToast(msg, type) {
    type = type || 'error';
    var container = document.getElementById('toastContainer');
    if (!container) return;
    var icons = { error: '⛔', warning: '⚠️', success: '✅', info: 'ℹ️' };
    var el = document.createElement('div');
    el.className = 'toast-alert toast-' + type;
    el.innerHTML = '<span class="icon">' + (icons[type] || 'ℹ️') + '</span><span>' + msg + '</span>';
    container.appendChild(el);
    setTimeout(function() {
        el.style.opacity = '0';
        el.style.transform = 'translateY(-20px)';
        el.style.transition = 'all 0.3s ease';
        setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
    }, 4000);
}

function fetchWithTimeout(url, options, timeout) {
    options = options || {};
    timeout = timeout || CONFIG.TIMEOUT;
    var controller = new AbortController();
    var id = setTimeout(function() { controller.abort(); }, timeout);
    return fetch(url, Object.assign({}, options, { signal: controller.signal }))
        .then(function(response) { clearTimeout(id); return response; })
        .catch(function(error) {
            clearTimeout(id);
            if (error.name === 'AbortError') throw new Error('Koneksi timeout. Periksa koneksi internet Anda.');
            throw new Error(error.message || 'Gagal terhubung ke server');
        });
}

function loadSettings() {
    return fetchWithTimeout('http://localhost:3000/pengaturan/1')
        .then(function(res) {
            if (!res.ok) throw new Error('Server status ' + res.status);
            return res.json();
        })
        .then(function(data) {
            if (!data) return;
            var sekolahEl = document.getElementById('displaySekolah');
            if (sekolahEl) {
                sekolahEl.innerText = data.namaSekolah || 'SEKOLAH';
                if (data.ukuranSekolah) sekolahEl.style.fontSize = data.ukuranSekolah + 'px';
            }
            var aplikasiEl = document.getElementById('displayAplikasi');
            if (aplikasiEl) {
                aplikasiEl.innerText = data.namaAplikasi || 'CBT OFFLINE';
                if (data.ukuranAplikasi) aplikasiEl.style.fontSize = data.ukuranAplikasi + 'px';
            }
            var temaLogin = data.temaLogin || 'green';
            var layoutLogin = data.layoutLogin || 'modern';
            document.body.classList.remove(
                'theme-green','theme-blue','theme-purple','theme-orange',
                'theme-pink','theme-teal','theme-brown','theme-dark',
                'layout-modern','layout-classic','layout-minimal','layout-gradient'
            );
            document.body.classList.add('theme-' + temaLogin, 'layout-' + layoutLogin);
        })
        .catch(function(err) {
            console.warn('Gagal muat pengaturan, pakai default:', err.message);
            var sekolahEl = document.getElementById('displaySekolah');
            if (sekolahEl) sekolahEl.innerText = 'SMP AL-KARIMAH';
            var aplikasiEl = document.getElementById('displayAplikasi');
            if (aplikasiEl) aplikasiEl.innerText = 'CBT OFFLINE';
        });
}

function resetButton(btn) {
    if (btn) { btn.disabled = false; btn.innerText = '🚀 MULAI UJIAN'; }
}

function handleLogin(e) {
    if (e && typeof e.preventDefault === 'function') e.preventDefault();

    var UsernameInput = document.getElementById('UsernameInput');
    var btnLogin = document.getElementById('btnLogin');
    var Username = UsernameInput.value.trim();

    if (!Username) {
        showToast('Harap masukkan Username terlebih dahulu!', 'warning');
        UsernameInput.focus();
        UsernameInput.classList.add('is-invalid');
        setTimeout(function() { UsernameInput.classList.remove('is-invalid'); }, 2000);
        return;
    }

    btnLogin.disabled = true;
    btnLogin.innerText = '⏳ MEMPROSES...';
    showLoading(true);

    // ── Login via json-server ──────────────────────────────────────────
    var DB_URL = 'http://localhost:3000';

    Promise.all([
        fetch(DB_URL + '/siswa?username=' + encodeURIComponent(Username)).then(function(r){ return r.json(); }),
        fetch(DB_URL + '/ujian/1').then(function(r){ return r.json(); }),
        fetch(DB_URL + '/bankSoal').then(function(r){ return r.json(); })
    ])
    .then(function(results) {
        var siswaList = results[0];
        var ujian     = results[1] || {};
        var banks     = results[2] || [];

        // 1. Cek siswa
        var siswa = Array.isArray(siswaList) ? siswaList[0] : null;
        if (!siswa) {
            showToast('Username tidak ditemukan. Periksa kembali.', 'error');
            resetButton(btnLogin); showLoading(false); return;
        }

        // 2. Cek status
        if (siswa.status === 'Selesai') {
            showToast('Ujian Anda sudah selesai.', 'warning');
            resetButton(btnLogin); showLoading(false); return;
        }
        if (siswa.status === 'Diblokir') {
            showToast('Akun Anda diblokir. Hubungi pengawas.', 'error');
            resetButton(btnLogin); showLoading(false); return;
        }

        // 3. Cari paket ujian yang aktif untuk kelas siswa
        var paketList = ujian.paket || ujian.aktifPaket || [];
        var paket = paketList.find(function(p) {
            return p.aktif !== false &&
                   p.kelas && siswa.kelas &&
                   p.kelas.trim().toUpperCase() === siswa.kelas.trim().toUpperCase();
        });

        if (!paket) {
            showToast('Belum ada ujian aktif untuk kelas ' + siswa.kelas + '.', 'warning');
            resetButton(btnLogin); showLoading(false); return;
        }

        // 4. Ambil bank soal yang sesuai
        var bank = banks.find(function(b){ return b.id == paket.paketId; });
        if (!bank || !bank.daftarSoal || !bank.daftarSoal.length) {
            showToast('Paket soal untuk kelas ' + siswa.kelas + ' belum tersedia.', 'warning');
            resetButton(btnLogin); showLoading(false); return;
        }

        // 5. Acak soal jika dikonfigurasi
        var soal = bank.daftarSoal.slice();
        if (ujian.acakSoal) {
            for (var i = soal.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var tmp = soal[i]; soal[i] = soal[j]; soal[j] = tmp;
            }
        }

        // 6. Update paketId siswa di json-server
        fetch(DB_URL + '/siswa/' + siswa.id, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ paketId: paket.paketId, status: siswa.status === 'Belum' ? 'Mengerjakan' : siswa.status })
        }).catch(function(e){ console.warn('Gagal update paketId:', e); });

        // 7. Simpan session dan redirect
        showToast('Login berhasil! Mengalihkan...', 'success');
        try {
            sessionStorage.setItem('cbt_user',   JSON.stringify(siswa));
            sessionStorage.setItem('cbt_config',  JSON.stringify({
                durasi:         paket.durasi || ujian.durasi || 60,
                jamMulai:       paket.jamMulai || '',
                jamSelesai:     paket.jamSelesai || '',
                tampilkanNilai: ujian.tampilkanNilai || false,
                bobotPG:        paket.bobotPG  !== undefined ? paket.bobotPG  : 100,
                bobotEsai:      paket.bobotEsai !== undefined ? paket.bobotEsai : 0,
                paketId:        paket.paketId
            }));
            sessionStorage.setItem('cbt_soal',    JSON.stringify(soal));
            sessionStorage.setItem('cbt_mapel',   bank.mapel || '');
            sessionStorage.setItem('cbt_security', JSON.stringify({
                maxPelanggaran:     ujian.maxPelanggaran     || 3,
                pesanPelanggaran:   ujian.pesanPelanggaran   || '',
                pelanggaranSaatIni: siswa.pelanggaran        || 0,
                deteksiPelanggaran: ujian.deteksiPelanggaran !== false,
                alarmType:          ujian.alarmType          || 'beep',
                alarmDurasi:        ujian.alarmDurasi        || 3000
            }));
            setTimeout(function() { window.location.href = 'ujian.html'; }, 800);
        } catch(storageErr) {
            console.error('Gagal simpan sessionStorage:', storageErr);
            showToast('Gagal menyimpan session. Coba lagi.', 'error');
            resetButton(btnLogin);
        }
    })
    .catch(function(err) {
        console.error('Error login:', err);
        showToast('Gagal terhubung ke server. Pastikan json-server aktif.', 'error');
        resetButton(btnLogin);
    })
    .finally(function() {
        showLoading(false);
    });
}

document.addEventListener('DOMContentLoaded', function() {
    loadSettings().then(function() {
        setTimeout(function() {
            var UsernameInput = document.getElementById('UsernameInput');
            if (UsernameInput) UsernameInput.focus();
        }, 500);
    }).catch(function(err) {
        console.error('Error init:', err);
    });

    var UsernameInput = document.getElementById('UsernameInput');
    if (UsernameInput) {
        UsernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); handleLogin(e); }
        });
    }
});

window.onerror = function(msg, url, line, col, error) { console.error('Global:', msg, url, line); return false; };
window.addEventListener('unhandledrejection', function(ev) { console.error('Unhandled:', ev.reason); });
</script>
